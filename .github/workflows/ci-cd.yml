# ─────────────────────────────────────────────────────────────────────────────
# Chatify CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Triggers on push to main and pull requests targeting main.
#
# Jobs:
#   1. test-backend    — Install deps, run Vitest test suite
#   2. build-frontend  — Install deps, lint, build production bundle
#   3. docker-build    — Build & verify Docker images (after tests pass)
# ─────────────────────────────────────────────────────────────────────────────

name: Chatify CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  #  Backend Tests
  # ═══════════════════════════════════════════════════════════════════════════
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Cache the MongoDB binary that mongodb-memory-server downloads
      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-7.0

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════════
  #  Frontend Build
  # ═══════════════════════════════════════════════════════════════════════════
  build-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  #  Docker Build
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: chatify-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: chatify-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

